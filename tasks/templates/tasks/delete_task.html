{% extends 'tasks/base.html' %}

{% block title %}All Tasks{% endblock %}
{% block content %}
<h2>Delete Task</h2>

<p>Are you sure you want to delete "<strong>{{ task.title }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'task_list' %}">Cancel</a>
{% endblock %}
